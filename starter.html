<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Name</title>
  <style>
    /* Nairo Partners — Design System */
    :root {
      --np-dark-blue:   #435B76;
      --np-teal:        #068FB1;
      --np-teal-hover:  #057a98;
      --np-gold:        #F9AD23;
      --np-deep-navy:   #1A2E44;
      --np-mid-grey:    #666B73;
      --np-pale-grey:   #E6E8ED;
      --np-light-grey:  #E4E4E4;
      --np-surface:     #F5F6F8;
      --np-white:       #FFFFFF;
      --np-green:       #26B58D;
      --np-info-blue:   #32BEF0;
      --np-coral:       #F0785A;
      --np-amber:       #F9AD23;
      --font: "Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
      --radius-sm: 6px;
      --radius-md: 8px;
      --shadow-card: 0 1px 4px rgba(26, 46, 68, 0.08);
      --shadow-raised: 0 4px 16px rgba(26, 46, 68, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--np-surface);
      color: var(--np-dark-blue);
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Typography */
    h1 { font-size: 2rem;     font-weight: 700; color: var(--np-deep-navy); }
    h2 { font-size: 1.5rem;   font-weight: 600; color: var(--np-deep-navy); }
    h3 { font-size: 1.125rem; font-weight: 600; color: var(--np-dark-blue); }
    p  { color: var(--np-dark-blue); }
    small, .caption { font-size: 0.875rem; color: var(--np-mid-grey); }

    /* Navigation */
    nav {
      background: var(--np-deep-navy);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--np-white);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-tag {
      font-size: 0.75rem;
      color: var(--np-gold);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 24px; margin-left: auto; }
    .nav-links a {
      color: var(--np-pale-grey);
      text-decoration: none;
      font-size: 0.875rem;
    }
    .nav-links a:hover { color: var(--np-gold); }

    /* Top accent bar */
    .teal-bar {
      height: 3px;
      background: linear-gradient(90deg, #068FB1 0%, #32BEF0 100%);
    }

    /* Page layout */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Page header */
    .page-header {
      margin-bottom: 32px;
    }
    .page-header h1 { margin-bottom: 8px; }
    .page-header p  { color: var(--np-mid-grey); font-size: 1.05rem; }

    /* Cards */
    .card {
      background: var(--np-white);
      border: 1px solid var(--np-pale-grey);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-card);
    }
    .card-raised { box-shadow: var(--shadow-raised); }
    .card + .card { margin-top: 16px; }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--np-deep-navy);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--np-pale-grey);
    }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--np-teal); color: var(--np-white); }
    .btn-primary:hover { background: var(--np-teal-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--np-dark-blue);
      border: 1.5px solid var(--np-pale-grey);
    }
    .btn-secondary:hover { background: var(--np-surface); }
    .btn-gold      { background: var(--np-gold); color: var(--np-deep-navy); font-weight: 600; }
    .btn-gold:hover { background: #e09c1a; }
    .btn:disabled  { opacity: 0.45; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }

    /* Forms */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label { font-size: 0.875rem; font-weight: 500; color: var(--np-dark-blue); }
    input[type="text"],
    input[type="email"],
    input[type="search"],
    input[type="number"],
    select,
    textarea {
      background: var(--np-white);
      border: 1.5px solid var(--np-pale-grey);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--np-dark-blue);
      font-family: var(--font);
      font-size: 1rem;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--np-teal);
      outline: none;
      box-shadow: 0 0 0 3px rgba(6, 143, 177, 0.15);
    }
    textarea { resize: vertical; min-height: 100px; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .badge-success { background: #E8FAF5; color: var(--np-green);  border: 1px solid var(--np-green); }
    .badge-warning { background: #FEF5E4; color: var(--np-amber);  border: 1px solid var(--np-amber); }
    .badge-error   { background: #FEF0EC; color: var(--np-coral);  border: 1px solid var(--np-coral); }
    .badge-info    { background: #E6F7FD; color: var(--np-teal);   border: 1px solid var(--np-info-blue); }
    .badge-neutral { background: var(--np-surface); color: var(--np-mid-grey); border: 1px solid var(--np-pale-grey); }

    /* Dividers */
    hr { border: none; border-top: 1px solid var(--np-pale-grey); margin: 24px 0; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--np-mid-grey);
    }
    .empty-state p { font-size: 0.95rem; margin-top: 8px; }

    /* Utility */
    .flex         { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-end     { display: flex; justify-content: flex-end; }
    .gap-8        { gap: 8px; }
    .gap-16       { gap: 16px; }
    .mt-8         { margin-top: 8px; }
    .mt-16        { margin-top: 16px; }
    .mt-24        { margin-top: 24px; }
    .mb-16        { margin-bottom: 16px; }
    .mb-24        { margin-bottom: 24px; }
    .text-muted   { color: var(--np-mid-grey); }
    .text-small   { font-size: 0.875rem; }
    .w-full       { width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--np-mid-grey); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--np-dark-blue); }
  </style>
</head>
